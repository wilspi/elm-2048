        <!-- Structured data -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "VideoGame",
                "name": "2048",
                "description": "Join the numbers and get to the 2048 tile!",
                "url": "https://dev.wilspi.com/elm-2048/",
                "author": {
                    "@type": "Person",
                    "name": "wilspi",

                },

                "operatingSystem": "Any"

        </script>

        <link rel="stylesheet" href="./src/styles/main.css" />

    </head>

    <body>
        <div id="root"></div>
        <div>Made with ❤ by <a href="https://wilspi.com">wilspi</a>️</div>
        <script>
            var mountNode = document.getElementById("root");
            var bestScore = parseInt(
                localStorage.getItem("2048-best-score") || "0",
                10,
            );
            var app = Elm.Main.init({ node: mountNode, flags: bestScore });

            app.ports.saveBestScore.subscribe(function (score) {
                localStorage.setItem("2048-best-score", score);
            });

            // Gesture state
            var currentMode = "off";
            var currentGamma = 0; // left/right tilt
            var currentBeta = 0;  // forward/back tilt
            var orientationFired = false;
            var TILT_THRESHOLD = 28;
            var NEUTRAL_ZONE = 12;

            // Shake state
            var lastAccel = { x: 0, y: 0, z: 0 };
            var lastShakeAt = 0;
            var shakeAccum = 0;
            var shakeLockDir = null;
            var shakeLockExpiry = 0;
            var SHAKE_LOCK_THRESHOLD = 4;
            var SHAKE_FIRE_THRESHOLD = 28;
            var SHAKE_DOMINANT_RATIO = 1.8;
            var SHAKE_COOLDOWN = 900;
            var SHAKE_LOCK_WINDOW = 400;

            function directionFromOrientation() {
                var g = currentGamma;
                var b = currentBeta - 90; // normalize: 0 = upright
                var absG = Math.abs(g);
                var absB = Math.abs(b);
                if (absG < 10 && absB < 10) return null;
                if (absG >= absB) return g > 0 ? "right" : "left";
                return b > 0 ? "down" : "up";
            }

            function handleOrientation(e) {
                currentGamma = e.gamma || 0;
                currentBeta = e.beta || 0;
                if (currentMode === "off") return;

                var absG = Math.abs(currentGamma);
                var absB = Math.abs(currentBeta - 90);

                if (!orientationFired) {
                    if (absG > TILT_THRESHOLD || absB > TILT_THRESHOLD) {
                        var dir = directionFromOrientation();
                        if (dir) {
                            orientationFired = true;
                            app.ports.onGesture.send(dir);
                        }
                    }
                } else if (absG < NEUTRAL_ZONE && absB < NEUTRAL_ZONE) {
                    orientationFired = false;
                }
            }

            function handleMotion(e) {
                if (currentMode !== "both") return;
                var a = e.accelerationIncludingGravity;
                if (!a) return;
                var dx = a.x - lastAccel.x;
                var dy = a.y - lastAccel.y;
                lastAccel = { x: a.x, y: a.y, z: a.z };
                var absDx = Math.abs(dx);
                var absDy = Math.abs(dy);
                var now = Date.now();

                if (now > shakeLockExpiry) { shakeLockDir = null; shakeAccum = 0; }

                if (!shakeLockDir) {
                    var dom = absDx >= absDy
                        ? absDx / (absDy || 0.1)
                        : absDy / (absDx || 0.1);
                    if ((absDx > SHAKE_LOCK_THRESHOLD || absDy > SHAKE_LOCK_THRESHOLD) && dom >= SHAKE_DOMINANT_RATIO) {
                        shakeLockDir = absDx >= absDy
                            ? (dx > 0 ? "right" : "left")
                            : (dy > 0 ? "up" : "down");
                        shakeLockExpiry = now + SHAKE_LOCK_WINDOW;
                        shakeAccum = 0;
                    }
                }

                if (shakeLockDir) {
                    shakeAccum += (shakeLockDir === "left" || shakeLockDir === "right") ? absDx : absDy;
                    if (shakeAccum >= SHAKE_FIRE_THRESHOLD && now - lastShakeAt > SHAKE_COOLDOWN) {
                        // Use orientation to confirm/override direction
                        var orientDir = directionFromOrientation();
                        var dir = orientDir || shakeLockDir;
                        lastShakeAt = now;
                        app.ports.onGesture.send(dir);
                        shakeLockDir = null;
                        shakeAccum = 0;
                    }
                }
            }

            function setupGestures() {
                window.addEventListener("deviceorientation", handleOrientation);
                window.addEventListener("devicemotion", handleMotion);
            }

            function requestAndSetup() {
                var needsPermission =
                    typeof DeviceMotionEvent !== "undefined" &&
                    typeof DeviceMotionEvent.requestPermission === "function";
                if (needsPermission) {
                    Promise.all([
                        DeviceMotionEvent.requestPermission(),
                        DeviceOrientationEvent.requestPermission(),
                    ])
                        .then(function (states) {
                            if (states.every(function (s) { return s === "granted"; })) {
                                setupGestures();
                            }
                        })
                        .catch(console.error);
                } else {
                    setupGestures();
                }
            }

            app.ports.setGestureMode.subscribe(function (mode) {
                currentMode = mode;
                if (mode !== "off" && !window._gesturesSetUp) {
                    window._gesturesSetUp = true;
                    requestAndSetup();
                }
            });

            document.addEventListener("click", function (e) {
                var btn = e.target.closest(".share-button");
                if (!btn) return;
                var score = btn.getAttribute("data-score") || "0";
                var best = btn.getAttribute("data-best") || "0";
                var url = "https://dev.wilspi.com/elm-2048/";
                var text =
                    "🎮 2048\n" +
                    "My Score: " + score + " (Best: " + best + ")\n" +
                    "Can you beat me?";
                if (navigator.share) {
                    navigator.share({ title: "2048", text: text, url: url });
                } else {
                    window.open(
                        "https://twitter.com/intent/tweet?text=" +
                            encodeURIComponent(text + " " + url),
                        "_blank",
                        "noopener",
                    );
                }
            });
        </script>
    </body>
</html>
