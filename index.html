    <body>
        <div id="root"></div>
        <div>Made with ❤ by <a href="https://wilspi.com">wilspi</a>️</div>
        <script>
            var mountNode = document.getElementById("root");
            var bestScore = parseInt(
                localStorage.getItem("2048-best-score") || "0",
                10,
            );
            var app = Elm.Main.init({ node: mountNode, flags: bestScore });

            app.ports.saveBestScore.subscribe(function (score) {
                localStorage.setItem("2048-best-score", score);
            });

            // Directional shake detection
            var lastAccel = { x: 0, y: 0, z: 0 };
            var lastShakeAt = 0;
            var lockedDirection = null;  // direction locked on first significant movement
            var accumulated = 0;         // magnitude built up in that direction
            var lockExpiry = 0;          // when to abandon the current lock
            var LOCK_THRESHOLD = 4;      // min delta to lock a direction
            var FIRE_THRESHOLD = 30;     // accumulated magnitude to trigger move
            var DOMINANT_RATIO = 1.8;    // axis must dominate by this factor
            var SHAKE_COOLDOWN = 900;
            var LOCK_WINDOW = 400;       // ms before direction lock resets

            function setupShake() {
                window.addEventListener("devicemotion", function (e) {
                    var a = e.accelerationIncludingGravity;
                    if (!a) return;
                    var dx = a.x - lastAccel.x;
                    var dy = a.y - lastAccel.y;
                    lastAccel = { x: a.x, y: a.y, z: a.z };
                    var absDx = Math.abs(dx);
                    var absDy = Math.abs(dy);
                    var now = Date.now();

                    // Reset lock if window expired
                    if (now > lockExpiry) {
                        lockedDirection = null;
                        accumulated = 0;
                    }

                    // Lock direction on first significant, clearly dominant movement
                    if (!lockedDirection) {
                        var dominant = absDx >= absDy
                            ? absDx / (absDy || 0.1)
                            : absDy / (absDx || 0.1);
                        if ((absDx > LOCK_THRESHOLD || absDy > LOCK_THRESHOLD) &&
                            dominant >= DOMINANT_RATIO) {
                            lockedDirection = absDx >= absDy
                                ? (dx > 0 ? "shake-right" : "shake-left")
                                : (dy > 0 ? "shake-up" : "shake-down");
                            lockExpiry = now + LOCK_WINDOW;
                            accumulated = 0;
                        }
                    }

                    // Accumulate magnitude along locked axis
                    if (lockedDirection) {
                        accumulated += lockedDirection.includes("left") || lockedDirection.includes("right")
                            ? absDx : absDy;

                        if (accumulated >= FIRE_THRESHOLD && now - lastShakeAt > SHAKE_COOLDOWN) {
                            lastShakeAt = now;
                            app.ports.onShake.send(lockedDirection);
                            lockedDirection = null;
                            accumulated = 0;
                        }
                    }
                });
            }

            // iOS 13+ requires explicit permission from a user gesture
            if (
                typeof DeviceMotionEvent !== "undefined" &&
                typeof DeviceMotionEvent.requestPermission === "function"
            ) {
                document.addEventListener(
                    "click",
                    function requestMotion() {
                        DeviceMotionEvent.requestPermission()
                            .then(function (state) {
                                if (state === "granted") setupShake();
                            })
                            .catch(console.error);
                        document.removeEventListener("click", requestMotion);
                    },
                    { once: true },
                );
            } else {
                setupShake();
            }

            document.addEventListener("click", function (e) {
                var btn = e.target.closest(".share-button");
                if (!btn) return;
                var score = btn.getAttribute("data-score") || "0";
                var best = btn.getAttribute("data-best") || "0";
                var url = "https://dev.wilspi.com/elm-2048/";
                var text =
                    "🎮 2048\n" +
                    "My Score: " + score + " (Best: " + best + ")\n" +
                    "Can you beat me?";
                if (navigator.share) {
                    navigator.share({ title: "2048", text: text, url: url });
                } else {
                    window.open(
                        "https://twitter.com/intent/tweet?text=" +
                            encodeURIComponent(text + " " + url),
                        "_blank",
                        "noopener",
                    );
                }
            });
        </script>
    </body>
