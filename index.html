    <body>
        <div id="root"></div>
        <div>Made with ❤ by <a href="https://wilspi.com">wilspi</a>️</div>
        <script>
            var mountNode = document.getElementById("root");
            var bestScore = parseInt(
                localStorage.getItem("2048-best-score") || "0",
                10,
            );
            var app = Elm.Main.init({ node: mountNode, flags: bestScore });

            app.ports.saveBestScore.subscribe(function (score) {
                localStorage.setItem("2048-best-score", score);
            });

            // Shared state
            var currentMode = "off";
            var currentGamma = 0; // left/right tilt (-90 to 90)
            var currentBeta = 0; // upright = ~90, normalize to 0

            // Orientation-only state
            var TILT_THRESHOLD = 25; // degrees to trigger
            var ORIENTATION_INTERVAL = 400; // ms between repeated moves while tilted
            var lastOrientationMoveAt = 0;

            // Shake state (for "both" mode)
            var lastAccel = { x: 0, y: 0, z: 0 };
            var lastShakeAt = 0;
            var SHAKE_THRESHOLD = 20; // total acceleration delta to count as shake
            var SHAKE_COOLDOWN = 800;

            // Read direction purely from current tilt angles
            function directionFromOrientation() {
                var g = currentGamma; // left(-) / right(+)
                var b = currentBeta - 90; // upright=0, forward(+) / back(-)
                if (Math.abs(g) >= Math.abs(b)) {
                    return g > 0 ? "right" : "left";
                } else {
                    return b > 0 ? "down" : "up";
                }
            }

            function handleOrientation(e) {
                currentGamma = e.gamma || 0;
                currentBeta = e.beta || 0;
                if (currentMode !== "orientation") return;

                var absG = Math.abs(currentGamma);
                var absB = Math.abs(currentBeta - 90);
                var now = Date.now();

                if (
                    (absG > TILT_THRESHOLD || absB > TILT_THRESHOLD) &&
                    now - lastOrientationMoveAt > ORIENTATION_INTERVAL
                ) {
                    lastOrientationMoveAt = now;
                    app.ports.onGesture.send(directionFromOrientation());
                }
            }

            function handleMotion(e) {
                if (currentMode !== "both") return;
                var a = e.accelerationIncludingGravity;
                if (!a) return;
                var total =
                    Math.abs(a.x - lastAccel.x) +
                    Math.abs(a.y - lastAccel.y) +
                    Math.abs(a.z - lastAccel.z);
                lastAccel = { x: a.x, y: a.y, z: a.z };
                var now = Date.now();
                if (
                    total > SHAKE_THRESHOLD &&
                    now - lastShakeAt > SHAKE_COOLDOWN
                ) {
                    lastShakeAt = now;
                    // Direction comes entirely from current orientation, not from the shake itself
                    app.ports.onGesture.send(directionFromOrientation());
                }
            }

            function setupGestures() {
                window.addEventListener("deviceorientation", handleOrientation);
                window.addEventListener("devicemotion", handleMotion);
            }

            function requestAndSetup() {
                var needsPermission =
                    typeof DeviceMotionEvent !== "undefined" &&
                    typeof DeviceMotionEvent.requestPermission === "function";
                if (needsPermission) {
                    Promise.all([
                        DeviceMotionEvent.requestPermission(),
                        DeviceOrientationEvent.requestPermission(),
                    ])
                        .then(function (states) {
                            if (
                                states.every(function (s) {
                                    return s === "granted";
                                })
                            ) {
                                setupGestures();
                            }
                        })
                        .catch(console.error);
                } else {
                    setupGestures();
                }
            }

            app.ports.setGestureMode.subscribe(function (mode) {
                currentMode = mode;
                if (mode !== "off" && !window._gesturesSetUp) {
                    window._gesturesSetUp = true;
                    requestAndSetup();
                }
            });

            document.addEventListener("click", function (e) {
                var btn = e.target.closest(".share-button");
                if (!btn) return;
                var score = btn.getAttribute("data-score") || "0";
                var best = btn.getAttribute("data-best") || "0";
                var url = "https://2048.wilspi.com/";
                var text =
                    "🎮 My Score: " +
                    score +
                    " (Best: " +
                    best +
                    ")\n" +
                    "Can you beat me?\n\n";
                if (navigator.share) {
                    navigator.share({ title: "2048", text: text, url: url });
                } else {
                    window.open(
                        "https://twitter.com/intent/tweet?text=" +
                            encodeURIComponent(text + " " + url),
                        "_blank",
                        "noopener",
                    );
                }
            });
        </script>
    </body>
</html>
